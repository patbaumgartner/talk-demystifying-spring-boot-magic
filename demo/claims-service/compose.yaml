services:
  postgres:
    image: 'postgres:17-alpine'
    environment:
      POSTGRES_DB: 'claims'
      POSTGRES_USER: 'claims'
      POSTGRES_PASSWORD: 'claims'
    ports:
      - '5432:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U claims -d claims' ]
      interval: 5s
      timeout: 5s
      retries: 5

