# Hikari: tiny pool, fast acquisition/validation, legal minimum lifecycle values
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=1000
spring.datasource.hikari.validation-timeout=1000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=60000

# Faster Spring shutdown in tests
server.shutdown=immediate
spring.lifecycle.timeout-per-shutdown-phase=1s

# Disable the OpenTelemetry SDK in tests (Spring Boot 4.1+).
# Uses no-op implementations for all OTel providers so no exporter threads are
# started and no connection-refused noise appears in test output.
management.opentelemetry.enabled=false
management.logging.export.otlp.enabled=false
