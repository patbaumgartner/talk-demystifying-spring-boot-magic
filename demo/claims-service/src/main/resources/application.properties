spring.application.name=claims-service

# -----------------------------------------------------------------------
# Demo: auto-configuration conditions report
# -----------------------------------------------------------------------
# Logs the full ConditionEvaluationReport on startup so you can see every
# @Conditional decision Spring Boot made – including the audit starter ones.
# Remove (or set to false) in production.
debug=true

# -----------------------------------------------------------------------
# Database – Spring Data JDBC + PostgreSQL
# -----------------------------------------------------------------------
# DataSource credentials are NOT set here.  When running locally, the
# spring-boot-docker-compose starter reads compose.yaml, starts the
# 'postgres' service, and auto-configures the DataSource from the
# container's environment variables (POSTGRES_DB / USER / PASSWORD).
#
# When running tests, @ServiceConnection on the PostgreSQLContainer does
# the same – zero manual property overrides required in either case.

# Schema is managed by Flyway – see src/main/resources/db/migration/.
# Flyway auto-runs on startup; Spring Boot's sql.init and Modulith's own DDL are disabled.
spring.modulith.events.jdbc-schema-initialization.enabled=false

# Keep the database alive when the application stops during development
# (prevents Docker Compose from destroying the container on Ctrl+C).
spring.docker.compose.lifecycle-management=start-only

# -----------------------------------------------------------------------
# Audit starter configuration
# -----------------------------------------------------------------------
# Nothing required – the starter is active by default (matchIfMissing = true).
# Uncomment to customise:

# audit.topic=claims-audit-events     # route to a specific Kafka topic / log channel
# audit.enabled=false                 # disable audit logging on this service entirely

# -----------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------
# Expose endpoints to inspect what Spring Boot auto-configured.
#   /actuator/conditions   – @Conditional decisions for every bean
#   /actuator/configprops  – resolved @ConfigurationProperties values
#   /actuator/env          – all property sources and their values
#   /actuator/modulith     – live Spring Modulith module graph
management.endpoints.web.exposure.include=health,info,conditions,env,configprops,modulith
management.endpoint.health.show-details=always

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging.level.com.fortytwotalents=DEBUG
# Console pattern with traceId/spanId is defined in logback-spring.xml.

# -----------------------------------------------------------------------
# Observability – OpenTelemetry, Tracing, Metrics
# -----------------------------------------------------------------------
# Sample every request (1.0 = 100 %). Lower in production if needed.
management.tracing.export.enabled=true
management.tracing.sampling.probability=1.0
management.observations.annotations.enabled=true

# All three OTel signals flow to the same Collector endpoint (OTLP HTTP 4318).
# The Collector fans out to the appropriate LGTM backend:
#   /v1/traces  → Tempo
#   /v1/metrics → Mimir
#   /v1/logs    → Loki

# Traces
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

# Metrics (Micrometer OtlpMeterRegistry → Collector → Mimir)
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
management.otlp.metrics.export.step=10s

# Logs (OTel Logback bridge → OTel SDK → Collector → Loki)
# management.logging.export.otlp.enabled is off by default – must be opted in.
management.logging.export.otlp.enabled=true
management.opentelemetry.logging.export.otlp.endpoint=http://localhost:4318/v1/logs
