# Grafana dashboard provider
# Points at /var/lib/grafana/dashboards where dashboard JSON files are mounted.

apiVersion: 1

providers:
  - name: claims-service
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
