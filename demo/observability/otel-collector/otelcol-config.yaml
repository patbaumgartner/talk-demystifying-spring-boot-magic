# OpenTelemetry Collector – claims-service observability stack
#
# All three signals arrive on a single OTLP HTTP endpoint (4318) and are
# fanned out to the appropriate Grafana LGTM backend:
#
#   App → OTLP HTTP (4318) → Collector → Tempo  (traces,  OTLP gRPC)
#                                       → Mimir  (metrics, OTLP HTTP)
#                                       → Loki   (logs,    HTTP push)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batch before export to reduce network overhead
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Add resource attributes for better context in backends
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

exporters:
  # Forward traces to Tempo via OTLP gRPC
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Forward metrics to Mimir via OTLP HTTP
  # Mimir exposes the OTLP ingest endpoint at /otlp/v1/metrics
  otlp_http/mimir:
    endpoint: http://mimir:9009/otlp
    tls:
      insecure: true

  # Debug exporter – logs a summary of each batch (useful for local dev)
  debug:
    verbosity: basic

  # Forward logs to Loki via its native OTLP HTTP endpoint (Loki 3.x+).
  # Loki ingests OTel logs natively at /otlp/v1/logs — no dedicated loki
  # exporter needed; service.name is auto-mapped to a Loki stream label.
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp_grpc/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp_http/mimir]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp_http/loki]

  telemetry:
    logs:
      level: info
